[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gepa-wrapper"
version = "0.1.0"
description = "GEPA wrapper for InkOS prompt optimization"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "gepa>=0.1.0",
    "pydantic>=2.0",
    "openai>=1.0",
    "anthropic>=0.20",
    "httpx>=0.25",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["src/gepa_wrapper"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
